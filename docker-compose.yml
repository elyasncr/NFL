# ─────────────────────────────────────────────────────────────────
#  NFL Analytics Lab — Docker Compose (DESENVOLVIMENTO)
#  Hot reload ativo para backend e frontend
#  Volumes persistentes para dados, modelos e ChromaDB
# ─────────────────────────────────────────────────────────────────
version: '3.8'

services:

  # ── Backend (FastAPI) ─────────────────────────────────────────
  # Conecta ao Ollama nativo do host (Windows) via host.docker.internal.
  # Ollama deve estar rodando localmente em :11434 com llama3 instalado.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nfl_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app                        # hot reload do código
      - nfl_data_cache:/app/data_cache        # cache dos dados NFL (evita re-download)
      - nfl_models:/app/models                # modelos ML treinados
      - nfl_chroma:/app/chroma_db             # ChromaDB (RAG)
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.1
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Compatibilidade Linux; no Docker Desktop é automático
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Frontend (React/Vite dev) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: nfl_dashboard
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                       # hot reload do código
      - frontend_node_modules:/app/node_modules  # node_modules isolado
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nfl_data_cache:   # Dados play-by-play da NFL (~500MB)
  nfl_models:       # Modelos ML treinados (.pkl)
  nfl_chroma:       # Índice vetorial ChromaDB
  frontend_node_modules:
