# ─────────────────────────────────────────────────────────────────
#  NFL Analytics Lab — Docker Compose (DESENVOLVIMENTO)
#  Hot reload ativo para backend e frontend
#  Volumes persistentes para dados, modelos e ChromaDB
# ─────────────────────────────────────────────────────────────────
version: '3.8'

services:

  # ── Ollama (LLM local) ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nfl_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Ollama Init (puxa o modelo na 1ª vez) ────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: nfl_ollama_init
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo '[INIT] Verificando modelo llama3...' &&
        OLLAMA_HOST=http://ollama:11434 ollama pull llama3 &&
        echo '[INIT] Modelo llama3 pronto!'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: no

  # ── Backend (FastAPI) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nfl_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app                        # hot reload do código
      - nfl_data_cache:/app/data_cache        # cache dos dados NFL (evita re-download)
      - nfl_models:/app/models                # modelos ML treinados
      - nfl_chroma:/app/chroma_db             # ChromaDB (RAG)
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Frontend (React/Vite dev) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: nfl_dashboard
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                       # hot reload do código
      - frontend_node_modules:/app/node_modules  # node_modules isolado
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:      # Modelos do Ollama (llama3 = ~4GB)
  nfl_data_cache:   # Dados play-by-play da NFL (~500MB)
  nfl_models:       # Modelos ML treinados (.pkl)
  nfl_chroma:       # Índice vetorial ChromaDB
  frontend_node_modules:
